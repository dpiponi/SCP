<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MM5799 Step Debugger</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: #fffaf0;
      --ink: #1f1a14;
      --muted: #74685b;
      --line: #d9cdbd;
      --accent: #0f6b5c;
      --accent-soft: #d4efe9;
      --warn: #8f3d00;
      --ram-hi: #fff1c7;
      --pc-hi: #d9f4cf;
      --sel-hi: #cde6ff;
      --font-ui: "Avenir Next", "Segoe UI", sans-serif;
      --font-code: "SF Mono", "Menlo", "Consolas", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #f7f3eb 0%, #efe7da 100%);
      color: var(--ink);
      font-family: var(--font-ui);
    }
    .app {
      display: grid;
      grid-template-columns: 400px 460px 1fr;
      height: 100vh;
      gap: 12px;
      padding: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(40, 32, 20, 0.06);
      overflow: hidden;
    }
    .left {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }
    .left > .panel {
      min-height: 0;
    }
    .middle {
      display: grid;
      grid-template-rows: 1fr;
      gap: 12px;
      min-height: 0;
      overflow: auto;
    }
    .section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child { border-bottom: 0; }
    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    button:disabled {
      opacity: 0.55;
      cursor: default;
    }
    button:hover { filter: brightness(0.98); }
    .grid {
      display: grid;
      gap: 8px;
    }
    .register-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .field {
      display: grid;
      gap: 4px;
    }
    .field label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      background: white;
      color: var(--ink);
      font-family: var(--font-code);
      font-size: 13px;
    }
    .field.checkbox {
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      background: white;
    }
    .field.checkbox label {
      font-size: 12px;
      color: var(--ink);
      text-transform: none;
      letter-spacing: 0;
    }
    .toolbar-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: white;
      font-size: 12px;
    }
    .toolbar-option input[type="number"] {
      width: 64px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 6px;
      font: inherit;
      font-family: var(--font-code);
    }
    .toolbar-option input[type="text"] {
      width: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 6px;
      font: inherit;
      font-family: var(--font-code);
      text-align: center;
    }
    .keypad-wrap {
      display: grid;
      gap: 8px;
    }
    .keypad-top {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .keypad-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .keypad-controls {
      display: grid;
      gap: 8px;
      margin-bottom: 4px;
    }
    .keypad-status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-family: var(--font-code);
      font-size: 12px;
    }
    .keypad-status span {
      background: #f5eee1;
      border: 1px solid var(--line);
      padding: 4px 8px;
      border-radius: 999px;
    }
    .key {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      padding: 10px 8px;
      text-align: center;
      font: inherit;
      font-family: var(--font-code);
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      min-height: 42px;
    }
    .key.active {
      background: #ffcc5c;
      border-color: #b36a00;
      box-shadow: inset 0 0 0 2px rgba(179, 106, 0, 0.24);
    }
    .key.scanned {
      border-color: #4b7db8;
      box-shadow: inset 0 0 0 2px rgba(67, 119, 184, 0.22);
    }
    .key.active.scanned {
      background: #d8f0da;
      border-color: #2c8f4d;
      box-shadow: inset 0 0 0 2px rgba(44, 143, 77, 0.22);
    }
    .key-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }
    .small-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.4;
    }
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-family: var(--font-code);
      font-size: 13px;
      margin-top: 8px;
      min-height: 34px;
      align-items: flex-start;
    }
    .status-strip span {
      background: #f5eee1;
      border: 1px solid var(--line);
      padding: 4px 8px;
      border-radius: 999px;
    }
    .status-strip span.pending-skip {
      background: #ffe5c9;
      border-color: #d58b3f;
      color: #7a3f00;
      font-weight: 700;
    }
    .status-strip span.pending-skip.idle {
      visibility: hidden;
    }
    .ram-wrap {
      padding: 0 14px 14px;
      overflow: auto;
      min-height: 0;
    }
    .ram-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }
    .ram-grid {
      display: grid;
      grid-template-columns: 48px repeat(16, 1fr);
      gap: 4px;
      align-items: center;
      font-family: var(--font-code);
      font-size: 12px;
    }
    .ram-head, .ram-row-label {
      color: var(--muted);
      text-align: center;
      border-radius: 6px;
      padding: 2px 0;
    }
    .ram-head.current, .ram-row-label.current {
      background: #fde6a8;
      color: #6a4a00;
      font-weight: 700;
    }
    .ram-cell {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: white;
      border-radius: 6px;
      padding: 4px 0;
      text-align: center;
      font-family: var(--font-code);
      font-size: 12px;
    }
    .ram-cell.current {
      background: var(--ram-hi);
      border-color: #d4a72a;
      box-shadow: inset 0 0 0 2px #b47a00;
      font-weight: 700;
    }
    .ram-cell.selected {
      border-color: #4377b8;
      box-shadow: inset 0 0 0 2px rgba(67, 119, 184, 0.35);
    }
    .ram-cell.watch {
      border-color: #a22a2a;
      box-shadow: inset 0 0 0 2px rgba(162, 42, 42, 0.18);
    }
    .ram-cell.current.watch {
      box-shadow: inset 0 0 0 2px #b47a00, 0 0 0 1px rgba(162, 42, 42, 0.35);
    }
    .ram-cell.current.selected {
      box-shadow: inset 0 0 0 2px #b47a00, 0 0 0 1px rgba(67, 119, 184, 0.55);
    }
    .display-wrap {
      display: grid;
      gap: 10px;
    }
    .hardware-panel {
      overflow: auto;
    }
    .hardware-wrap {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      aspect-ratio: 1671 / 3652;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: url("calculator_cropped_tight10_cleaned_strong.png") center/cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
      touch-action: manipulation;
      user-select: none;
    }
    .hardware-display {
      position: absolute;
      left: 5.07%;
      top: 8.03%;
      width: 89.80%;
      height: 7.91%;
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 2px;
      pointer-events: none;
    }
    .hardware-digit {
      position: relative;
      border-radius: 3px;
    }
    .hardware-digit.active {
      box-shadow: inset 0 0 0 1px rgba(80, 160, 255, 0.7);
    }
    .hardware-digit.selected {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.85);
    }
    .hw-sevenseg {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .hw-seg {
      position: absolute;
      background: rgba(255, 28, 40, 0.08);
      transition: background 80ms linear, box-shadow 80ms linear;
    }
    .hw-seg.on {
      background: rgba(255, 65, 92, 0.9);
      box-shadow: 0 0 7px rgba(255, 35, 70, 0.52);
    }
    .hw-seg.a, .hw-seg.d, .hw-seg.g {
      width: 58%;
      height: 10%;
      left: 21%;
      border-radius: 4px;
    }
    .hw-seg.a { top: 2%; }
    .hw-seg.g { top: 45%; }
    .hw-seg.d { bottom: 2%; }
    .hw-seg.b, .hw-seg.c, .hw-seg.e, .hw-seg.f {
      width: 12%;
      height: 34%;
      border-radius: 4px;
    }
    .hw-seg.f { left: 6%; top: 7%; }
    .hw-seg.b { right: 6%; top: 7%; }
    .hw-seg.e { left: 6%; bottom: 7%; }
    .hw-seg.c { right: 6%; bottom: 7%; }
    .hw-dot {
      position: absolute;
      right: -8%;
      bottom: 0;
      width: 12%;
      height: 12%;
      border-radius: 50%;
      background: rgba(255, 35, 70, 0.09);
    }
    .hw-dot.on {
      background: rgba(255, 92, 120, 0.95);
      box-shadow: 0 0 7px rgba(255, 55, 86, 0.55);
    }
    .hw-key {
      position: absolute;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: box-shadow 100ms linear, background 100ms linear, border-color 100ms linear;
    }
    .hw-key.active {
      border-color: rgba(71, 129, 205, 0.95);
      background: rgba(71, 129, 205, 0.2);
      box-shadow: inset 0 0 0 1px rgba(71, 129, 205, 0.55);
    }
    .hw-key.scanned {
      border-color: rgba(44, 159, 86, 0.95);
      background: rgba(44, 159, 86, 0.25);
      box-shadow: inset 0 0 0 1px rgba(44, 159, 86, 0.55);
    }
    .hw-key.active.scanned {
      border-width: 2px;
      box-shadow: inset 0 0 0 1px rgba(44, 159, 86, 0.75);
    }
    .display-status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .display-status span {
      min-width: 96px;
    }
    .calc-display {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #0f1514, #182120);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .calc-digit {
      min-height: 72px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(35,53,49,0.96), rgba(20,31,29,0.96));
      color: #86ffbb;
      display: grid;
      align-items: start;
      justify-items: center;
      padding: 4px 4px 2px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .calc-digit.active {
      border-color: rgba(134,255,187,0.45);
      box-shadow: inset 0 0 0 1px rgba(134,255,187,0.2), 0 0 0 1px rgba(134,255,187,0.08);
    }
    .calc-digit.selected {
      border-color: rgba(95, 166, 255, 0.35);
      box-shadow: inset 0 0 0 1px rgba(95, 166, 255, 0.16);
    }
    .sevenseg {
      position: relative;
      width: 34px;
      height: 56px;
      margin-top: 2px;
    }
    .seg {
      position: absolute;
      background: rgba(134,255,187,0.10);
      box-shadow: inset 0 0 0 1px rgba(134,255,187,0.05);
      transition: background 80ms linear, box-shadow 80ms linear;
    }
    .seg.on {
      background: #86ffbb;
      box-shadow: 0 0 10px rgba(134,255,187,0.34);
    }
    .seg.a, .seg.d, .seg.g {
      width: 18px;
      height: 5px;
      left: 8px;
      border-radius: 4px;
    }
    .seg.a { top: 0; }
    .seg.g { top: 25px; }
    .seg.d { bottom: 0; }
    .seg.b, .seg.c, .seg.e, .seg.f {
      width: 5px;
      height: 18px;
      border-radius: 4px;
    }
    .seg.f { left: 2px; top: 4px; }
    .seg.b { right: 2px; top: 4px; }
    .seg.e { left: 2px; bottom: 4px; }
    .seg.c { right: 2px; bottom: 4px; }
    .calc-dot {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(134,255,187,0.16);
    }
    .calc-dot.on {
      background: #baffd6;
      box-shadow: 0 0 8px rgba(186,255,214,0.35);
    }
    .right {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }
    .code-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }
    .code-header .title {
      font-size: 15px;
      font-weight: 600;
    }
    .code-header .meta {
      color: var(--muted);
      font-size: 12px;
    }
    .disasm {
      overflow: auto;
      min-height: 0;
      font-family: var(--font-code);
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.7)),
        repeating-linear-gradient(180deg, transparent, transparent 28px, rgba(122, 104, 80, 0.045) 28px, rgba(122, 104, 80, 0.045) 29px);
    }
    .line {
      white-space: pre;
      padding: 0 14px 0 28px;
      border-left: 4px solid transparent;
      cursor: default;
      position: relative;
    }
    .line.instr {
      cursor: pointer;
    }
    .line.instr:hover {
      background: #f3efe8;
    }
    .line.current {
      background: var(--pc-hi);
      border-left-color: var(--accent);
    }
    .line.previous {
      background: #e3f3ee;
      border-left-color: #5d9d8c;
    }
    .line.selected {
      background: var(--sel-hi);
      border-left-color: #4377b8;
    }
    .line.current.selected {
      background: linear-gradient(90deg, var(--pc-hi), #eef9e9);
      border-left-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(15, 107, 92, 0.14);
    }
    .line.breakpoint::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 50%;
      width: 10px;
      height: 10px;
      margin-top: -5px;
      border-radius: 50%;
      background: #c23b22;
      box-shadow: 0 0 0 1px rgba(92, 20, 10, 0.18);
    }
    .line.current.breakpoint::before {
      background: #0f6b5c;
      box-shadow: 0 0 0 1px rgba(15, 107, 92, 0.2);
    }
    .line.page {
      color: var(--warn);
      font-weight: 600;
      margin-top: 8px;
    }
    .line.label {
      color: #7a3f19;
      font-weight: 600;
    }
    .op-tip {
      text-decoration: underline dotted rgba(15, 107, 92, 0.55);
      text-underline-offset: 2px;
      cursor: help;
    }
    @media (max-width: 1100px) {
      body {
        height: auto;
        overflow: auto;
      }
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }
      .left {
        order: 2;
        overflow: visible;
      }
      .middle {
        order: 3;
        overflow: visible;
      }
      .right {
        order: 1;
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="left">
      <div class="panel">
        <div class="section">
          <h1>MM5799 Step Debugger</h1>
          <div class="subtitle">
            Code view is driven by the current best annotated listing in
            <code>analysis/sinclaircambridgeprogrammable.dan.asm</code>.
          </div>
          <div class="toolbar">
            <button class="primary" id="step-btn">Step</button>
            <button id="stepover-btn">To RET</button>
            <button id="step10-btn">Step 10</button>
            <button id="continue-btn">Continue</button>
            <button id="reset-btn">Reset</button>
            <button id="apply-btn">Apply Edits</button>
            <button id="goto-pc-btn">Scroll To PC</button>
            <button id="goto-writer-btn">Go To Writer</button>
            <label class="toolbar-option" for="animate-toggle">
              <input type="checkbox" id="animate-toggle" checked>
              <span>Animate</span>
            </label>
            <label class="toolbar-option" for="breakpoints-toggle">
              <input type="checkbox" id="breakpoints-toggle" checked>
              <span>Breakpoints</span>
            </label>
            <label class="toolbar-option" for="animate-delay">
              <span>Delay ms</span>
              <input type="number" id="animate-delay" min="0" max="2000" step="10" value="0">
            </label>
            <label class="toolbar-option" for="lb05-value">
              <span>LB(r,5)</span>
              <input type="text" id="lb05-value" value="4" placeholder="hex">
            </label>
          </div>
          <div class="status-strip" id="status-strip"></div>
        </div>
      </div>

      <div class="panel">
        <div class="section">
          <div class="grid register-grid" id="register-grid"></div>
        </div>
      </div>

      <div class="panel">
        <div class="section">
          <div class="grid register-grid" id="flag-grid"></div>
        </div>
      </div>

      <div class="panel ram-panel">
        <div class="section">
          <strong>RAM (128 nibbles)</strong>
        </div>
        <div class="ram-wrap">
          <div class="ram-grid" id="ram-grid"></div>
        </div>
      </div>
    </div>

    <div class="middle">
      <div class="panel hardware-panel">
        <div class="section">
          <strong>Hardware</strong>
          <div class="hardware-wrap" id="hardware-wrap"></div>
          <div class="small-note">
            Click keys on the photo. Blue = held/toggled, green = currently scanned row.
          </div>
          <div class="keypad-wrap" id="keypad"></div>
          <div class="keypad-controls">
            <label class="toolbar-option" for="key-input-mode">
              <span>Key Mode</span>
              <select id="key-input-mode">
                <option value="toggle" selected>Toggle</option>
                <option value="hold">Hold</option>
              </select>
            </label>
            <label class="toolbar-option" for="force-k">
              <span>Force K</span>
              <input type="text" id="force-k" value="" placeholder="hex">
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="panel right">
      <div class="code-header">
        <div class="title">Annotated Disassembly</div>
        <div class="meta" id="code-meta"></div>
      </div>
      <div class="disasm" id="disasm"></div>
    </div>

01_W075:", "name": "P01_W075"}, {"type": "instr", "logical": 120, "physical": 125, "opcode": 161, "body": "CALL           MOVE_DECIMAL_POINT_LEFT", "labels": ["P01_W075"], "text": "  0170 @0175  241  CALL           MOVE_DECIMAL_POINT_LEFT"}, {"type": "instr", "logical": 121, "physical": 126, "opcode": 246, "body": "GO             P01_W066", "labels": [], "text": "  0171 @0176  366  GO             P01_W066"}, {"type": "text", "text": ""}, {"type": "label", "text": "SKIP_IF_ROW_NZ:", "name": "SKIP_IF_ROW_NZ"}, {"type": "instr", "logical": 122, "physical": 127, "opcode": 48, "body": "0TA", "labels": ["SKIP_IF_ROW_NZ"], "text": "  0172 @0177  060  0TA           "}, {"type": "instr", "logical": 123, "physical": 95, "opcode": 50, "body": "TAM", "labels": [], "text": "  0173 @0137  062  TAM           "}, {"type": "instr", "logical": 124, "physical": 79, "opcode": 65, "body": "RETS", "labels": [], "text": "  0174 @0117  101  RETS           "}, {"type": "instr", "logical": 125, "physical": 71, "opcode": 8, "body": "EXC-", "labels": [], "text": "  0175 @0107  010  EXC-          "}, {"type": "instr", "logical": 126, "physical": 67, "opcode": 255, "body": "GO             SKIP_IF_ROW_NZ", "labels": [], "text": "  0176 @0103  377  GO             SKIP_IF_ROW_NZ"}, {"type": "instr", "logical": 127, "physical": 65, "opcode": 64, "body": "RET", "labels": [], "text": "  0177 @0101  100  RET           "}, {"type": "text", "text": ""}, {"type": "page", "text": "; PAGE 2 "}, {"type": "text", "text": "; Special handling when A == 2"}, {"type": "text", "text": "; Get digit for display."}, {"type": "text", "text": "; This is digit from row 0"}, {"type": "text", "text": "; unless A = 2 in whih case it comes from"}, {"type": "text", "text": "; the last bit set in the digit"}, {"type": "text", "text": "; First time here A = 7"}, {"type": "text", "text": "; We only get here from 0246"}, {"type": "label", "text": "DISPLAY_TOP:", "name": "DISPLAY_TOP"}, {"type": "instr", "logical": 128, "physical": 128, "opcode": 137, "body": "CALL           LOAD_MEM_15", "labels": ["DISPLAY_TOP"], "text": "  0200 @0200  211  CALL           LOAD_MEM_15"}, {"type": "text", "text": "; We are going to jump to P02_W015 if A == 2"}, {"type": "instr", "logical": 129, "physical": 160, "opcode": 93, "body": "ADX 13", "labels": [], "text": "  0201 @0240  135  ADX 13        "}, {"type": "instr", "logical": 130, "physical": 144, "opcode": 0, "body": "NOP", "labels": [], "text": "  0202 @0220  000  NOP           "}, {"type": "text", "text": "; This ADX 1 is effectively a test for whether A == 15"}, {"type": "instr", "logical": 131, "physical": 136, "opcode": 81, "body": "ADX 1", "labels": [], "text": "  0203 @0210  121  ADX 1          "}, {"type": "instr", "logical": 132, "physical": 132, "opcode": 205, "body": "GO             P02_W015 ; jump if A == 15", "labels": [], "text": "  0204 @0204  315  GO             P02_W015 ; jump if A == 15"}, {"type": "text", "text": "; Looks like display loop"}, {"type": "text", "text": "; remember ~x = -x - 1"}, {"type": "text", "text": "; First time here we fall through with A = 5"}, {"type": "label", "text": "DISPLAY:", "name": "DISPLAY"}, {"type": "text", "text": "; At this point A specifies the address of the digit for display"}, {"type": "instr", "logical": 133, "physical": 130, "opcode": 86, "body": "ADX 6          ; Now A == 11", "labels": ["DISPLAY"], "text": "  0205 @0202  126  ADX 6          ; Now A == 11"}, {"type": "instr", "logical": 134, "physical": 161, "opcode": 10, "body": "LB MEM_04", "labels": [], "text": "  0206 @0241  012  LB MEM_04"}, {"type": "text", "text": "; Get digit address from A"}, {"type": "instr", "logical": 135, "physical": 176, "opcode": 80, "body": "ATB            ; Bd <- A. So A controls digit in register.", "labels": [], "text": "  0207 @0260  120  ATB            ; Bd <- A. So A controls digit in register."}, {"type": "text", "text": "; First time fetches 0 from 0x0b, presumably lowest digit"}, {"type": "instr", "logical": 136, "physical": 152, "opcode": 6, "body": "MTA            ; Fetch digit for display", "labels": [], "text": "  0210 @0230  006  MTA            ; Fetch digit for display"}, {"type": "text", "text": "; We only get here from 0277"}, {"type": "label", "text": "DISPLAY_LOOP:", "name": "DISPLAY_LOOP"}, {"type": "text", "text": "  ; Stash display digit"}, {"type": "instr", "logical": 137, "physical": 140, "opcode": 49, "body": "HXA            ; H <- display digit", "labels": ["DISPLAY_LOOP"], "text": "  0211 @0214  061  HXA            ; H <- display digit"}, {"type": "instr", "logical": 138, "physical": 134, "opcode": 48, "body": "0TA", "labels": [], "text": "  0212 @0206  060  0TA           "}, {"type": "instr", "logical": 139, "physical": 163, "opcode": 32, "body": "COMP           ; A <- 0xf", "labels": [], "text": "  0213 @0243  040  COMP           ; A <- 0xf"}, {"type": "instr", "logical": 140, "physical": 145, "opcode": 3, "body": "SC             ; C <- 1", "labels": [], "text": "  0214 @0221  003  SC             ; C <- 1"}, {"type": "text", "text": "  ; blank digit so we don't get ghosting when D changes"}, {"type": "instr", "logical": 141, "physical": 168, "opcode": 17, "body": "DSPS           ; Sa...Sg <- A, Sp <- ~C (Sp == decimal point)", "labels": [], "text": "  0215 @0250  021  DSPS           ; Sa...Sg <- A, Sp <- ~C (Sp == decimal point)"}, {"type": "instr", "logical": 142, "physical": 148, "opcode": 67, "body": "BTA            ; A <- Bd (A is digit index)", "labels": [], "text": "  0216 @0224  103  BTA            ; A <- Bd (A is digit index)"}, {"type": "instr", "logical": 143, "physical": 138, "opcode": 35, "body": "RSC            ; C <- 0", "labels": [], "text": "  0217 @0212  043  RSC            ; C <- 0"}, {"type": "instr", "logical": 144, "physical": 165, "opcode": 26, "body": "LB MEM_14 ; MEM_14 (0x15) participates directly in the display loop", "labels": [], "text": "  0220 @0245  032  LB MEM_14 ; MEM_14 (0x15) participates directly in the display loop"}, {"type": "instr", "logical": 145, "physical": 178, "opcode": 50, "body": "TAM", "labels": [], "text": "  0221 @0262  062  TAM"}, {"type": "text", "text": "; First time through we skip because M[0x15] == 11 == A, so C == 0"}, {"type": "instr", "logical": 146, "physical": 185, "opcode": 3, "body": "SC             ; C == 1 if different", "labels": [], "text": "  0222 @0271  003  SC             ; C == 1 if different"}, {"type": "text", "text": "; Compute display address from RAM address by subtracting from 11"}, {"type": "text", "text": "; Rightmost digit at 0xb -> 0 (leftmost but 1)"}, {"type": "text", "text": ";                    0x4 -> 7 (rightmost digit)"}, {"type": "text", "text": "; (assuming 9 digits numbered f, 0, 1, 2, 3, 4, 5, 6, 7)"}, {"type": "instr", "logical": 147, "physical": 188, "opcode": 32, "body": "COMP           ; A <- -Bd - 1", "labels": [], "text": "  0223 @0274  040  COMP           ; A <- -Bd - 1"}, {"type": "instr", "logical": 148, "physical": 158, "opcode": 92, "body": "ADX 12         ; A <- 11 - Bd", "labels": [], "text": "  0224 @0236  134  ADX 12         ; A <- 11 - Bd"}, {"type": "text", "text": "; First time through, A == 0"}, {"type": "instr", "logical": 149, "physical": 175, "opcode": 0, "body": "NOP", "labels": [], "text": "  0225 @0257  000  NOP           "}, {"type": "text", "text": "; A selects display digit"}, {"type": "instr", "logical": 150, "physical": 151, "opcode": 80, "body": "ATB            ; Bd <- A", "labels": [], "text": "  0226 @0227  120  ATB            ; Bd <- A"}, {"type": "text", "text": "; Select digit for output"}, {"type": "instr", "logical": 151, "physical": 139, "opcode": 37, "body": "BTD            ; D <- Bd and BLK set low (D is key scan)", "labels": [], "text": "  0227 @0213  045  BTD            ; D <- Bd and BLK set low (D is key scan)"}, {"type": "instr", "logical": 152, "physical": 133, "opcode": 28, "body": "LB MEM_1C  ; MEM_1C / TKB front-end of the keypad scan path", "labels": [], "text": "  0230 @0205  034  LB MEM_1C  ; MEM_1C / TKB front-end of the keypad scan path"}, {"type": "instr", "logical": 153, "physical": 162, "opcode": 21, "body": "TKB            ; Check key pressed!", "labels": [], "text": "  0231 @0242  025  TKB            ; Check key pressed!"}, {"type": "instr", "logical": 154, "physical": 177, "opcode": 211, "body": "GO             DISPLAY_DIGIT ; loop if no key active", "labels": [], "text": "  0232 @0261  323  GO             DISPLAY_DIGIT ; loop if no key active"}, {"type": "instr", "logical": 155, "physical": 184, "opcode": 74, "body": "SM 8", "labels": [], "text": "  0233 @0270  112  SM 8          "}, {"type": "instr", "logical": 156, "physical": 156, "opcode": 70, "body": "TM 4           ; are we ready for key?", "labels": [], "text": "  0234 @0234  106  TM 4           ; are we ready for key?"}, {"type": "instr", "logical": 157, "physical": 142, "opcode": 98, "body": "LG             LGGO   P33_W000 ; Handle key?", "labels": [], "text": "  0235 @0216  142  LG             LGGO   P33_W000 ; Handle key?"}, {"type": "instr", "logical": 158, "physical": 167, "opcode": 192, "body": "DATA    3,00", "labels": [], "text": "  0236 @0247  300  DATA    3,00"}, {"type": "label", "text": "DISPLAY_DIGIT:", "name": "DISPLAY_DIGIT"}, {"type": "text", "text": "; Not ready for key"}, {"type": "text", "text": "; A must still be equal to Bd"}, {"type": "instr", "logical": 159, "physical": 147, "opcode": 32, "body": "COMP          ; A <- ~A = -A-1", "labels": ["DISPLAY_DIGIT"], "text": "  0237 @0223  040  COMP          ; A <- ~A = -A-1"}, {"type": "instr", "logical": 160, "physical": 137, "opcode": 92, "body": "ADX 12        ; 11 - Bd?", "labels": [], "text": "  0240 @0211  134  ADX 12        ; 11 - Bd?"}, {"type": "instr", "logical": 161, "physical": 164, "opcode": 0, "body": "NOP", "labels": [], "text": "  0241 @0244  000  NOP           "}, {"type": "instr", "logical": 162, "physical": 146, "opcode": 49, "body": "HXA           ; H <-> A, bring back stashed digit", "labels": [], "text": "  0242 @0222  061  HXA           ; H <-> A, bring back stashed digit"}, {"type": "instr", "logical": 163, "physical": 169, "opcode": 17, "body": "DSPS          ; output A to whatever Bd was at BTD above", "labels": [], "text": "  0243 @0251  021  DSPS          ; output A to whatever Bd was at BTD above"}, {"type": "instr", "logical": 164, "physical": 180, "opcode": 49, "body": "HXA           ; H <-> A", "labels": [], "text": "  0244 @0264  061  HXA           ; H <-> A"}, {"type": "instr", "logical": 165, "physical": 154, "opcode": 91, "body": "ADX 11", "labels": [], "text": "  0245 @0232  133  ADX 11        "}, {"type": "instr", "logical": 166, "physical": 173, "opcode": 192, "body": "GO             DISPLAY_TOP", "labels": [], "text": "  0246 @0255  300  GO             DISPLAY_TOP"}, {"type": "instr", "logical": 167, "physical": 182, "opcode": 85, "body": "ADX 5", "labels": [], "text": "  0247 @0266  125  ADX 5         "}, {"type": "instr", "logical": 168, "physical": 187, "opcode": 71, "body": "TM 8", "labels": [], "text": "  0250 @0273  107  TM 8          "}, {"type": "label", "text": "P02_W035:", "name": "P02_W035"}, {"type": "instr", "logical": 169, "physical": 157, "opcode": 48, "body": "0TA", "labels": ["P02_W035"], "text": "  0251 @0235  060  0TA           "}, {"type": "text", "text": "; M[0x1c] must contain status represented by leftmost"}, {"type": "text", "text": "; position includes E=error, F=1st shift, G=2nd shift"}, {"type": "instr", "logical": 170, "physical": 174, "opcode": 28, "body": "LB MEM_1C", "labels": [], "text": "  0252 @0256  034  LB MEM_1C "}, {"type": "instr", "logical": 171, "physical": 183, "opcode": 23, "body": "EXC 1", "labels": [], "text": "  0253 @0267  027  EXC 1         "}, {"type": "instr", "logical": 172, "physical": 155, "opcode": 214, "body": "GO             FIND_LAST_BIT", "labels": [], "text": "  0254 @0233  326  GO             FIND_LAST_BIT"}, {"type": "label", "text": "P02_W015:", "name"             tmp = state.A;
            {
              const addr = getB();
              state.A = readMem(addr);
              writeMem(addr, tmp);
            }
            state.Br ^= ((opcode >> 4) & 0x3);
            state.Bd = (state.Bd + 1) & 0xF;
            if (state.Bd === 0 || state.Bd === 13) state.skip = true;
            break;
          case 0x0A: case 0x0B: case 0x0C: case 0x0D: case 0x0E: case 0x0F:
          case 0x1A: case 0x1B: case 0x1C: case 0x1D: case 0x1E: case 0x1F:
          case 0x2A: case 0x2B: case 0x2C: case 0x2D: case 0x2E: case 0x2F:
          case 0x3A: case 0x3B: case 0x3C: case 0x3D: case 0x3E: case 0x3F:
            if (!state.wasLB) {
              state.Br = (opcode >> 4) & 0x3;
              tmp = opcode & 0x0F;
              if (tmp === 0x0A) state.Bd = lb05Value();
              else if (tmp >= 0x0B) state.Bd = tmp;
            }
            state.wasLB = true;
            notLB = false;
            break;
          case 0x10:
            state.S = (((state.H & 0x7) << 4) | (state.A & 0xF) | dpBit()) & 0xFF;
            break;
          case 0x11:
            dspsExecuted = true;
            state.S = (((SEGMENT_DATA[state.A] ?? 0) & 0x7F) | dpBit()) & 0xFF;
            if (beforeLogical !== 0o215) {
              latchVisibleDisplayDigit(SEGMENT_GLYPHS[state.A] || "?");
            }
            break;
          case 0x12:
            state.A = normaliseNibble(state.A + readMem(getB()));
            break;
          case 0x13:
            {
              const second = romByte(state.Pp, nextpc);
              setBFromParts((second >> 4) & 0x7, second & 0xF);
              nextpc = getNextPc(nextpc);
            }
            break;
          case 0x14:
            if (state.F2 === 0) state.skip = true;
            break;
          case 0x15:
            {
              const held = heldKeySummaryForD(state.D);
              const liveK = kinput(state.D);
              state.F2 = (liveK & 0x4) ? 0 : 1;
              if (liveK > 0) state.skip = true;
              noteTrace(
                `TKB D=${hex(state.D, 1)} row=${decodedScanRow(state.D)} ` +
                `held=${held.held} onRow=${held.onRow} rowMask=${hex(held.rowMask, 1)} ` +
                `live=${hex(liveK, 1)} ` +
                `skip=${state.skip ? 1 : 0}`
              );
            }
            break;
          case 0x20:
            state.A = normaliseNibble(~state.A);
            break;
          case 0x21:
            tmp = state.A;
            state.A = state.serbuf & 0xF;
            state.serbuf = tmp & 0xF;
            break;
          case 0x22:
            tmp = (~state.A & 0xF) + state.C + readMem(getB());
            state.A = tmp & 0xF;
            if (tmp > 15) {
              state.C = 1;
              state.skip = true;
            } else {
              state.C = 0;
            }
            break;
          case 0x23:
            state.C = 0;
            break;
          case 0x24:
            if (state.F3 === 0) state.skip = true;
            break;
          case 0x25:
            tmp = state.D & 0xF;
            state.D = state.Bd & 0xF;
            state.blk = 0;
            clockDs8874FromD(tmp, state.D);
            state.displaySelected = displayDigitIndexFromD(state.Bd);
            break;
          case 0x30:
            state.A = 0;
            break;
          case 0x31:
            tmp = state.A;
            state.A = state.H & 0xF;
            state.H = tmp & 0xF;
            break;
          case 0x32:
            if (state.A === readMem(getB())) state.skip = true;
            break;
          case 0x33:
            {
              const second = romByte(state.Pp, nextpc);
              if ((second & 0x20) === 0) state.F3 = (second & 0x10) ? 1 : 0;
              if ((second & 0x08) === 0) state.F2 = (second & 0x04) ? 1 : 0;
              if ((second & 0x02) === 0) state.F1 = (second & 0x01) ? 1 : 0;
              nextpc = getNextPc(nextpc);
            }
            break;
          case 0x34:
            state.A = kinput(state.D) & 0xF;
            break;
          case 0x35:
            if (state.INB === 1) state.skip = true;
            break;
          case 0x40:
          case 0x41:
            if (opcode === 0x41) state.skip = true;
            tmp = state.SA;
            state.SA = state.SB;
            nextpc = tmp & 0x3F;
            state.Pp = (tmp >> 6) & 0x1F;
            break;
          case 0x42:
            writeMem(getB(), readMem(getB()) & 0x7);
            break;
          case 0x43:
            state.A = state.Bd & 0xF;
            break;
          case 0x44:
            if ((readMem(getB()) & 0x1) === 0) state.skip = true;
            break;
          case 0x45:
            if ((readMem(getB()) & 0x2) === 0) state.skip = true;
            break;
          case 0x46:
            if ((readMem(getB()) & 0x4) === 0) state.skip = true;
            break;
          case 0x47:
            if ((readMem(getB()) & 0x8) === 0) state.skip = true;
            break;
          case 0x48:
            writeMem(getB(), readMem(getB()) & 0xE);
            break;
          case 0x49:
            writeMem(getB(), readMem(getB()) | 0x1);
            break;
          case 0x4A:
            writeMem(getB(), readMem(getB()) | 0x8);
            break;
          case 0x4B:
            writeMem(getB(), readMem(getB()) & 0xB);
            break;
          case 0x4C:
            writeMem(getB(), readMem(getB()) & 0xD);
            break;
          case 0x4D:
            if (state.C === 0) state.skip = true;
            break;
          case 0x4E:
            writeMem(getB(), readMem(getB()) | 0x2);
            break;
          case 0x4F:
            writeMem(getB(), readMem(getB()) | 0x4);
            break;
          case 0x50:
            state.Bd = state.A & 0xF;
            break;
          case 0x51: case 0x52: case 0x53: case 0x54: case 0x55: case 0x56: case 0x57:
          case 0x58: case 0x59: case 0x5A: case 0x5B: case 0x5C: case 0x5D: case 0x5E: case 0x5F:
            tmp = opcode & 0x0F;
            if (state.A + tmp < 16 && tmp !== 6) state.skip = true;
            state.A = normaliseNibble(state.A + tmp);
            break;
          case 0x60: case 0x61: case 0x62: case 0x63: case 0x64: case 0x65: case 0x66: case 0x67:
          case 0x68: case 0x69: case 0x6A: case 0x6B: case 0x6C: case 0x6D: case 0x6E: case 0x6F:
            {
              const second = romByte(state.Pp, nextpc);
              if ((second & 0x40) === 0) {
                state.SB = state.SA;
                state.SA = ((state.Pp & 0x1F) << 6) | getNextPc(nextpc);
              }
              state.Pp = (((15 - (opcode & 0x0F)) << 1) | ((second >> 7) & 1)) & 0x1F;
              nextpc = second & 0x3F;
            }
            break;
          default:
            if (opcode >= 0x70 && opcode <= 0x7F) {
              writeMem(getB(), opcode & 0x0F);
              state.Bd = (state.Bd + 1) & 0xF;
            } else if (opcode >= 0x80 && opcode <= 0xBF) {
              if ((state.Pp & 0x1E) !== 0x1E) {
                state.SB = state.SA;
                state.SA = ((state.Pp & 0x1F) << 6) | nextpc;
              }
              state.Pp = 0x1F;
              nextpc = opcode & 0x3F;
            } else if (opcode >= 0xC0 && opcode <= 0xFF) {
              nextpc = opcode & 0x3F;
              if (state.Pp === 0x1F) state.Pp = 0x1E;
            }
            break;
        }
        if (notLB) state.wasLB = false;
        const suffix = state.skip ? "  [skip armed]" : "";
        noteTrace(`${oct(beforeLogical, 4)} @${oct(beforeRaw, 4)}  ${opName}${suffix}`);
      }

      state.Pw = nextpc & 0x3F;
      previousLogicalPC = beforeLogical;
      currentExecutingLogical = null;
      if (lastRamWriteWatchHit != null) {
        noteTrace(`write breakpoint RAM[${hex(lastRamWriteWatchHit >> 4, 1)},${hex(lastRamWriteWatchHit & 0xF, 1)}]=${hex(readMem(lastRamWriteWatchHit), 1)}`);
      }
      if (renderUi) {
        renderAll();
        scrollToPc();
      }
      return {
        dspsExecuted,
        watchHit: lastRamWriteWatchHit != null,
      };
    }

    function renderRegisterGrid() {
      const root = document.getElementById("register-grid");
      const fields = [
        ["logical_pc", oct(getLogicalPC(), 4)],
        ["raw_pc", oct(getRawPC(), 4)],
        ["SA", oct(state.SA, 4)],
        ["SB", oct(state.SB, 4)],
        ["A", hex(state.A, 1)],
        ["H", hex(state.H, 1)],
        ["B", hex(getB(), 2)],
        ["C", String(state.C)],
        ["D", hex(state.D, 1)],
        ["K", hex(kinput(state.D), 1)],
        ["serbuf", hex(state.serbuf, 1)],
        ["S", hex(state.S, 2)],
      ];
      if (!root.dataset.initialized) {
        root.innerHTML = fields.map(([name, value]) => `
          <div class="field">
            <label for="reg-${name}">${name}</label>
            <input id="reg-${name}" data-reg="${name}" value="${value}">
          </div>
        `).join("");
        root.dataset.initialized = "1";
        return;
      }
      for (const [name, value] of fields) {
        const input = document.getElementById(`reg-${name}`);
        if (input && document.activeElement !== input) input.value = value;
      }
    }

    function renderFlagGrid() {
      const root = document.getElementById("flag-grid");
      const flags = [
        ["skip", state.skip],
        ["wasLB", state.wasLB],
        ["F1", state.F1],
        ["F2", state.F2],
        ["F3", state.F3],
        ["INB", state.INB],
        ["SI", state.SI],
        ["SO", state.SO],
        ["blk", state.blk],
      ];
      if (!root.dataset.initialized) {
        root.innerHTML = flags.map(([name, value]) => `
          <div class="field checkbox">
            <input type="checkbox" id="flag-${name}" data-flag="${name}" ${value ? "checked" : ""}>
            <label for="flag-${name}">${name}</label>
          </div>
        `).join("");
        root.dataset.initialized = "1";
        return;
      }
      for (const [name, value] of flags) {
        const input = document.getElementById(`flag-${name}`);
        if (input) input.checked = !!value;
      }
    }

    function renderStatus() {
      const status = document.getElementById("status-strip");
      const b = getB();
      const row = b >> 4;
      const col = b & 0xF;
      const value = state.M[b] & 0xF;
      const selected = selectedRamAddr == null ? null : (selectedRamAddr & 0x7F);
      const selRow = selected == null ? null : (selected >> 4);
      const selCol = selected == null ? null : (selected & 0xF);
      const selWrite = selected == null ? null : lastWriteLogicalByAddr[selected];
      status.innerHTML = `
        <span>logical ${oct(getLogicalPC(), 4)}</span>
        <span>prev ${previousLogicalPC == null ? "----" : oct(previousLogicalPC, 4)}</span>
        <span>raw ${oct(getRawPC(), 4)}</span>
        <span>opcode ${oct(currentOpcode(), 3)}</span>
        <span>${OPCODES[currentOpcode()] || "?"}</span>
        <span>B=${hex(b, 2)}</span>
        <span>RAM[${hex(row, 1)},${hex(col, 1)}]=${hex(value, 1)}</span>
        <span>sel ${selected == null ? "--" : `RAM[${hex(selRow, 1)},${hex(selCol, 1)}]`}</span>
        <span>writer ${selWrite == null ? "----" : oct(selWrite, 4)}</span>
        <span class="pending-skip${state.skip ? "" : " idle"}">next instruction will be skipped</span>
      `;
      document.getElementById("code-meta").textContent =
        `PC ${oct(getLogicalPC(), 4)}  prev ${previousLogicalPC == null ? "----" : oct(previousLogicalPC, 4)}  raw ${oct(getRawPC(), 4)}  B ${hex(b, 2)}  RAM[${hex(row, 1)},${hex(col, 1)}]=${hex(value, 1)}`;
    }

    function renderRam() {
      const grid = document.getElementById("ram-grid");
      const current = getB();
      const currentRow = current >> 4;
      const currentCol = current & 0xF;
      if (!grid.dataset.initialized) {
        let html = `<div></div>`;
        for (let col = 0; col < 16; col++) {
          const headCls = col === currentCol ? "ram-head current" : "ram-head";
          html += `<div class="${headCls}" data-ram-head="${col}">${hex(col, 1)}</div>`;
        }
        for (let row = 0; row < 8; row++) {
          const rowCls = row === currentRow ? "ram-row-label current" : "ram-row-label";
          html += `<div class="${rowCls}" data-ram-row="${row}">${hex(row, 1)}x</div>`;
          for (let col = 0; col < 16; col++) {
            const idx = row * 16 + col;
            const classes = ["ram-cell"];
            if (idx === current) classes.push("current");
            if (idx === selectedRamAddr) classes.push("selected");
            if (ramWriteWatchpoints.has(idx)) classes.push("watch");
            const writer = lastWriteLogicalByAddr[idx];
            const title = `${idx === current ? "B points here. " : ""}${idx === selectedRamAddr ? "Selected. " : ""}RAM[${hex(row, 1)},${hex(col, 1)}]${ramWriteWatchpoints.has(idx) ? " [write breakpoint]" : ""}${writer == null ? "" : ` [last write ${oct(writer, 4)}]`}`;
            html += `<input class="${classes.join(" ")}" title="${title}" data-ram="${idx}" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" maxlength="1" value="${hex(state.M[idx], 1)}">`;
          }
        }
        grid.innerHTML = html;
        grid.dataset.initialized = "1";
        return;
      }
      for (let col = 0; col < 16; col++) {
        const head = grid.querySelector(`[data-ram-head="${col}"]`);
        if (head) head.className = col === currentCol ? "ram-head current" : "ram-head";
      }
      for (let row = 0; row < 8; row++) {
        const label = grid.querySelector(`[data-ram-row="${row}"]`);
        if (label) label.className = row === currentRow ? "ram-row-label current" : "ram-row-label";
        for (let col = 0; col < 16; col++) {
          const idx = row * 16 + col;
          const input = grid.querySelector(`[data-ram="${idx}"]`);
          if (!input) continue;
          const classes = ["ram-cell"];
          if (idx === current) classes.push("current");
          if (idx === selectedRamAddr) classes.push("selected");
          if (ramWriteWatchpoints.has(idx)) classes.push("watch");
          input.className = classes.join(" ");
          const writer = lastWriteLogicalByAddr[idx];
          input.title = `${idx === current ? "B points here. " : ""}${idx === selectedRamAddr ? "Selected. " : ""}RAM[${hex(row, 1)},${hex(col, 1)}]${ramWriteWatchpoints.has(idx) ? " [write breakpoint]" : ""}${writer == null ? "" : ` [last write ${oct(writer, 4)}]`}`;
          if (document.activeElement !== input) input.value = hex(state.M[idx], 1);
        }
      }
    }

    function renderDisasm() {
      const root = document.getElementById("disasm");
      const currentLogical = getLogicalPC();
      const previousLogical = previousLogicalPC;
      if (root.dataset.initialized) {
        for (const line of root.querySelectorAll(".line.instr")) {
          const logical = Number(line.dataset.logical);
          line.classList.toggle("current", logical === currentLogical);
          line.classList.toggle("previous", logical === previousLogical && logical !== currentLogical);
          line.classList.toggle("selected", logical === selectedLogical);
          line.classList.toggle("breakpoint", breakpoints.has(logical));
        }
        return;
      }
      const escapeHtml = (text) =>
        (text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      root.innerHTML = DISASM_LINES.map((line, index) => {
        const classes = ["line", line.type];
        if (line.type === "instr" && line.logical === currentLogical) classes.push("current");
        if (line.type === "instr" && line.logical === previousLogical && line.logical !== currentLogical) classes.push("previous");
        if (line.type === "instr" && line.logical === selectedLogical) classes.push("selected");
        if (line.type === "instr" && breakpoints.has(line.logical)) classes.push("breakpoint");
        const logicalAttr = line.type === "instr" ? ` data-logical="${line.logical}"` : "";
        if (line.type !== "instr") {
          const safe = escapeHtml(line.text || "");
          return `<div class="${classes.join(" ")}" data-index="${index}"${logicalAttr}>${safe}</div>`;
        }
        const body = line.body || "";
        const bodyMatch = body.match(/^(\S+)(\s*)(.*)$/);
        let bodyHtml = escapeHtml(body);
        if (bodyMatch) {
          const opToken = bodyMatch[1];
          const gap = bodyMatch[2] || "";
          const tail = bodyMatch[3] || "";
          const summary = ISA_SUMMARIES[opToken] || ISA_SUMMARIES[OPCODES[line.opcode]] || "";
          const titleAttr = summary ? ` title="${escapeHtml(summary)}"` : "";
          bodyHtml =
            `<span class="op-tip"${titleAttr}>${escapeHtml(opToken)}</span>` +
            `${escapeHtml(gap)}${escapeHtml(tail)}`;
        }
        const prefix =
          `${oct(line.logical, 4)} @${oct(line.physical, 4)}  ${oct(line.opcode, 3)}  `;
        return `<div class="${classes.join(" ")}" data-index="${index}"${logicalAttr}>${prefix}${bodyHtml}</div>`;
      }).join("");
      root.dataset.initialized = "1";
    }

    function renderTrace() {
      return;
    }

    function renderHardware() {
      const root = document.getElementById("hardware-wrap");
      if (!root) return;
      const active = activeDisplayDigit();
      const selected = state.displaySelected % 9;
      const segNames = ["a", "b", "c", "d", "e", "f", "g"];
      const digits = [];
      for (let i = 0; i < 9; i++) {
        const seg = state.visibleDigits[i] & 0xFF;
        const glyph = state.visibleGlyphs[i] || " ";
        const lit = new Set(GLYPH_SEGMENTS[glyph] || GLYPH_SEGMENTS["?"]);
        const segHtml = segNames.map((name) => `<div class="hw-seg ${name}${lit.has(name) ? " on" : ""}"></div>`).join("");
        digits.push(`
          <div class="hardware-digit${active === i ? " active" : ""}${selected === i ? " selected" : ""}" title="digit ${i} seg=${hex(seg, 2)} reg=${state.dsReg[i] & 1}">
            <div class="hw-sevenseg">
              ${segHtml}
              <div class="hw-dot${seg & 0x80 ? " on" : ""}"></div>
            </div>
          </div>
        `);
      }
      const scanRow = decodedScanRow(state.D);
      const keys = KEYS.map((key) => {
        const p = KEY_HOTSPOTS[key.id];
        if (!p) return "";
        const left = 17.06 + p.col * 22.23 - 15.62 / 2;
        const top = 52.15 + p.row * 10.18 - 5.94 / 2;
        const activeCls = pressedKeys.has(key.id) ? " active" : "";
        const scannedCls = key.row === scanRow ? " scanned" : "";
        return `<button class="hw-key${activeCls}${scannedCls}" type="button" data-key="${key.id}" style="left:${left}%;top:${top}%;width:15.62%;height:5.94%;" title="${key.label}"></button>`;
      }).join("");
      const powerLeft = 17.06 + 3 * 22.23 - 15.62 / 2;
      const powerTop = 52.15 + 0 * 10.18 - 5.94 / 2;
      const power = `<button class="hw-key" type="button" data-action="power" style="left:${powerLeft}%;top:${powerTop}%;width:15.62%;height:5.94%;" title="ON/OFF (mapped to Reset)"></button>`;
      root.innerHTML = `
        <div class="hardware-display">${digits.join("")}</div>
        ${keys}
        ${power}
      `;
    }

    function renderDisplay() {
      const root = document.getElementById("display-wrap");
      if (!root) return;
      const active = activeDisplayDigit();
      const selected = state.displaySelected % 9;
      const digits = [];
      const segNames = ["a", "b", "c", "d", "e", "f", "g"];
      for (let i = 0; i < 9; i++) {
        const seg = state.visibleDigits[i] & 0xFF;
        const glyph = state.visibleGlyphs[i] || " ";
        const lit = new Set(GLYPH_SEGMENTS[glyph] || GLYPH_SEGMENTS["?"]);
        const segHtml = segNames.map((name) => `<div class="seg ${name}${lit.has(name) ? " on" : ""}"></div>`).join("");
        digits.push(`
          <div class="calc-digit${active === i ? " active" : ""}${selected === i ? " selected" : ""}" title="digit ${i} seg=${hex(seg, 2)} reg=${state.dsReg[i] & 1}">
            <div class="sevenseg">
              ${segHtml}
              <div class="calc-dot${seg & 0x80 ? " on" : ""}"></div>
            </div>
          </div>
        `);
      }
      root.innerHTML = `
        <div class="display-status">
          <span>latched digit=${active >= 0 ? active : "--"}</span>
          <span>selected digit=${selected}</span>
          <span>scan=${state.dsScan}</span>
          <span>DS reg=${state.dsReg.map((bit) => bit ? "1" : "0").join("")}</span>
          <span>S=${hex(state.S, 2)}</span>
        </div>
        <div class="calc-display">${digits.join("")}</div>
      `;
    }

    function renderKeypad() {
      const root = document.getElementById("keypad");
      const scanRow = decodedScanRow(state.D);
      const expectedMask = expectedKForD(state.D);
      const liveMask = kinput(state.D);
      const heldKeys = KEYS.filter((key) => pressedKeys.has(key.id));
      const heldLabels = heldKeys.map((key) => key.label);
      const heldOnRow = heldKeys.filter((key) => key.row === scanRow);
      let heldRowMask = 0;
      for (const key of heldOnRow) heldRowMask |= key.bit;
      root.innerHTML = `
        <div class="keypad-status">
          <span>D=${hex(state.D, 1)}</span>
          <span>scan row=${scanRow}</span>
          <span>held=${heldLabels.length ? heldLabels.join(",") : "--"}</span>
          <span>held on row=${heldOnRow.length ? heldOnRow.map((key) => key.label).join(",") : "--"}</span>
          <span>row-held mask=${hex(heldRowMask, 1)}</span>
          <span>expected K=${hex(expectedMask, 1)}</span>
          <span>live K=${hex(liveMask, 1)}</span>
          <span>F2=${state.F2}</span>
        </div>
      `;
    }

    function renderAll() {
      renderRegisterGrid();
      renderFlagGrid();
      renderHardware();
      renderDisplay();
      renderKeypad();
      renderStatus();
      renderRam();
      renderDisasm();
      renderTrace();
      updateControls();

    function updateControls() {
      for (const id of ["step-btn", "stepover-btn", "step10-btn", "continue-btn", "reset-btn", "apply-btn"]) {
        const el = document.getElementById(id);
        if (el) el.disabled = isRunning;
      }
      const gotoWriter = document.getElementById("goto-writer-btn");
      if (gotoWriter) gotoWriter.disabled = isRunning || selectedRamAddr == null || lastWriteLogicalByAddr[selectedRamAddr & 0x7F] == null;
    }

    function parseNumber(text, fallbackBase = 10) {
      const cleaned = text.trim();
      if (cleaned === "") return 0;
      if (/^[-+]?0x[0-9a-f]+$/i.test(cleaned)) return parseInt(cleaned, 16);
      if (/^[-+]?0o[0-7]+$/i.test(cleaned)) {
        const sign = cleaned[0] === "-" ? -1 : 1;
        const digits = cleaned.replace(/^[-+]?0o/i, "");
        return sign * parseInt(digits, 8);
      }
      if (/[a-f]/i.test(cleaned)) return parseInt(cleaned, 16);
      return parseInt(cleaned, fallbackBase);
    }

    function parseHex(text) {
      return parseNumber(text, 16);
    }

    function parseOctal(text) {
      return parseNumber(text, 8);
    }

    function syncUiToState() {
      const regInputs = document.querySelectorAll("[data-reg]");
      for (const input of regInputs) {
        const name = input.dataset.reg;
        const value = input.value;
        switch (name) {
          case "logical_pc":
            setPCFromLogical(parseOctal(value) & 0x7FF);
            break;
          case "page":
            state.Pp = parseOctal(value) & 0x1F;
            break;
          case "word":
            state.Pw = parseOctal(value) & 0x3F;
            break;
          case "raw_pc":
            {
              const raw = parseOctal(value) & 0x7FF;
              state.Pp = (raw >> 6) & 0x1F;
              state.Pw = raw & 0x3F;
            }
            break;
          case "SA":
          case "SB":
            state[name] = parseOctal(value) & 0x7FF;
            break;
          case "A":
          case "H":
          case "Br":
          case "Bd":
          case "D":
          case "serbuf":
            state[name] = parseHex(value) & 0xF;
            break;
          case "B":
            {
              const b = parseHex(value) & 0x7F;
              state.Br = (b >> 4) & 0x7;
              state.Bd = b & 0xF;
            }
            break;
          case "C":
            state.C = Number(value) ? 1 : 0;
            break;
          case "S":
            state.S = parseHex(value) & 0xFF;
            break;
        }
      }

      for (const input of document.querySelectorAll("[data-ram]")) {
        const idx = Number(input.dataset.ram);
        state.M[idx] = parseHex(input.value) & 0xF;
      }

      for (const input of document.querySelectorAll("[data-flag]")) {
        const name = input.dataset.flag;
        state[name] = input.checked ? 1 : 0;
      }
    }

    function applyEdits() {
      syncUiToState();
      renderAll();
      scrollToPc();
    }

    function scrollToPc() {
      const idx = LOGICAL_TO_LINE[String(getLogicalPC())];
      if (idx == null) return;
      const el = document.querySelector(`.line[data-index="${idx}"]`);
      if (el) el.scrollIntoView({block: "center"});
    }

    function focusRamCell(index) {
      const wrapped = ((index % 128) + 128) % 128;
      const el = document.querySelector(`[data-ram="${wrapped}"]`);
      if (!el) return;
      el.focus();
      el.select();
    }

    function gotoWriterForSelectedRam() {
      if (selectedRamAddr == null) return;
      const logical = lastWriteLogicalByAddr[selectedRamAddr & 0x7F];
      if (logical == null) return;
      setPCFromLogical(logical);
      renderAll();
      scrollToPc();
    }

    function stopForRamWriteWatchpoint() {
      if (lastRamWriteWatchHit == null) return false;
      renderAll();
      scrollToPc();
      return true;
    }

    function animationEnabled() {
      return document.getElementById("animate-toggle").checked;
    }

    function animationDelayMs() {
      const raw = Number(document.getElementById("animate-delay").value);
      if (!Number.isFinite(raw)) return 80;
      return Math.max(0, Math.min(2000, raw));
    }

    function breakpointsEnabled() {
      const el = document.getElementById("breakpoints-toggle");
      return !el || el.checked;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function nextPaint() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function renderStopState() {
      renderAll();
      scrollToPc();
    }

    function shouldStopAtBreakpoint(i) {
      return i > 0 && breakpointsEnabled() && breakpoints.has(getLogicalPC());
    }

    function returnWouldExecuteNow() {
      const opcode = currentOpcode();
      return !state.skip && (opcode === 0x40 || opcode === 0x41);
    }

    async function maybeAnimateStepResult(result, animated, i) {
      if (stopForRamWriteWatchpoint()) return true;
      if (animated) {
        await nextPaint();
        const delay = animationDelayMs();
        if (delay > 0) await sleep(delay);
      } else {
        if (result && result.dspsExecuted) {
          renderAll();
          await nextPaint();
        } else if ((i & 0x3F) === 0x3F) {
          await sleep(0);
        }
      }
      return false;
    }

    function stepMany(count) {
      syncUiToState();
      for (let i = 0; i < count; i++) {
        if (shouldStopAtBreakpoint(i)) {
          noteTrace(`stopped at breakpoint ${oct(getLogicalPC(), 4)}`);
          renderStopState();
          return;
        }
        const result = stepOne(false, false);
        if (lastRamWriteWatchHit != null) {
          renderStopState();
          return;
        }
        if (result && result.dspsExecuted) renderAll();
      }
    }

    async function runAnimatedSteps(count) {
      if (isRunning) return;
      syncUiToState();
      stopRequested = false;
      isRunning = true;
      updateControls();
      try {
        for (let i = 0; i < count; i++) {
          if (stopRequested) {
            noteTrace("run stopped by Escape");
            renderStopState();
            return;
          }
          if (shouldStopAtBreakpoint(i)) {
            noteTrace(`stopped at breakpoint ${oct(getLogicalPC(), 4)}`);
            renderStopState();
            return;
          }
          const result = stepOne(false, true);
          if (await maybeAnimateStepResult(result, true, i)) return;
        }
      } finally {
        isRunning = false;
        stopRequested = false;
        updateControls();
      }
    }

    async function continueExecution(maxSteps = 1000000) {
      if (isRunning) return;
      syncUiToState();
      stopRequested = false;
      isRunning = true;
      updateControls();
      try {
        for (let i = 0; i < maxSteps; i++) {
          const animated = animationEnabled();
          if (stopRequested) {
            noteTrace("continue stopped by Escape");
            renderStopState();
            return;
          }
          if (shouldStopAtBreakpoint(i)) {
            noteTrace(`stopped at breakpoint ${oct(getLogicalPC(), 4)}`);
            renderStopState();
            return;
          }
          const result = stepOne(false, animated);
          if (await maybeAnimateStepResult(result, animated, i)) return;
        }
        noteTrace(`continue stopped after ${maxSteps} steps`);
        renderTrace();
      } finally {
        isRunning = false;
        stopRequested = false;
        updateControls();
      }
    }

    function stepUntilReturn(maxSteps = 10000) {
      syncUiToState();
      for (let i = 0; i < maxSteps; i++) {
        if (shouldStopAtBreakpoint(i)) {
          noteTrace(`stopped at breakpoint ${oct(getLogicalPC(), 4)}`);
          renderStopState();
          return;
        }
        if (returnWouldExecuteNow()) {
          renderStopState();
          return;
        }
        const result = stepOne(false, false);
        if (lastRamWriteWatchHit != null) {
          renderStopState();
          return;
        }
        if (result && result.dspsExecuted) renderAll();
      }
      noteTrace(`step-until-return stopped after ${maxSteps} steps without executing RET/RETS`);
      renderTrace();
    }

    async function stepUntilReturnAnimated(maxSteps = 10000) {
      if (isRunning) return;
      syncUiToState();
      stopRequested = false;
      isRunning = true;
      updateControls();
      try {
        for (let i = 0; i < maxSteps; i++) {
          if (stopRequested) {
            noteTrace("run-to-return stopped by Escape");
            renderStopState();
            return;
          }
          if (shouldStopAtBreakpoint(i)) {
            noteTrace(`stopped at breakpoint ${oct(getLogicalPC(), 4)}`);
            renderStopState();
            return;
          }
          if (returnWouldExecuteNow()) {
            renderStopState();
            return;
          }
          const result = stepOne(false, true);
          if (await maybeAnimateStepResult(result, true, i)) return;
        }
        noteTrace(`step-until-return stopped after ${maxSteps} steps without executing RET/RETS`);
        renderTrace();
      } finally {
        isRunning = false;
        stopRequested = false;
        updateControls();
      }
    }

    document.getElementById("step-btn").addEventListener("click", () => stepOne());
    document.getElementById("stepover-btn").addEventListener("click", () => {
      if (animationEnabled()) stepUntilReturnAnimated();
      else stepUntilReturn();
    });
    document.getElementById("step10-btn").addEventListener("click", () => {
      if (animationEnabled()) runAnimatedSteps(10);
      else stepMany(10);
    });
    document.getElementById("continue-btn").addEventListener("click", () => continueExecution());
    document.getElementById("reset-btn").addEventListener("click", () => resetState());
    document.getElementById("apply-btn").addEventListener("click", () => applyEdits());
    document.getElementById("goto-pc-btn").addEventListener("click", () => scrollToPc());
    document.getElementById("goto-writer-btn").addEventListener("click", () => gotoWriterForSelectedRam());

    document.getElementById("disasm").addEventListener("click", (event) => {
      const line = event.target.closest(".line.instr");
      if (!line) return;
      if (event.metaKey) {
        const logical = Number(line.dataset.logical);
        if (breakpoints.has(logical)) breakpoints.delete(logical);
        else breakpoints.add(logical);
        renderDisasm();
        return;
      }
      selectedLogical = Number(line.dataset.logical);
      setPCFromLogical(selectedLogical);
      renderAll();
      scrollToPc();
    });

    document.getElementById("ram-grid").addEventListener("input", (event) => {
      const input = event.target.closest("[data-ram]");
      if (!input) return;
      const idx = Number(input.dataset.ram);
      selectedRamAddr = idx;
      const raw = (input.value || "").toUpperCase().replace(/[^0-9A-F]/g, "");
      input.value = raw.slice(-1);
      state.M[idx] = parseHex(input.value || "0") & 0xF;
      if (input.value.length === 1) {
        focusRamCell(idx + 1);
      }
      renderStatus();
      renderRam();
      updateControls();
    });

    document.getElementById("ram-grid").addEventListener("click", (event) => {
      const input = event.target.closest("[data-ram]");
      if (!input || event.metaKey) return;
      selectedRamAddr = Number(input.dataset.ram);
      renderStatus();
      renderRam();
      updateControls();
    });

    document.getElementById("ram-grid").addEventListener("pointerdown", (event) => {
      const input = event.target.closest("[data-ram]");
      if (!input) return;
      const idx = Number(input.dataset.ram);
      if (!event.metaKey) return;
      event.preventDefault();
      if (ramWriteWatchpoints.has(idx)) ramWriteWatchpoints.delete(idx);
      else ramWriteWatchpoints.add(idx);
      renderRam();
      renderStatus();
      updateControls();
    });

    document.getElementById("ram-grid").addEventListener("keydown", (event) => {
      const input = event.target.closest("[data-ram]");
      if (!input) return;
      const idx = Number(input.dataset.ram);
      if (event.key === "ArrowRight") {
        event.preventDefault();
        focusRamCell(idx + 1);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        focusRamCell(idx - 1);
      } else if (event.key === "ArrowDown") {
        event.preventDefault();
        focusRamCell(idx + 16);
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        focusRamCell(idx - 16);
      }
    });

    const handleKeyPointerDown = (event) => {
      const actionEl = event.target.closest("[data-action]");
      if (actionEl && actionEl.dataset.action === "power") {
        event.preventDefault();
        resetState();
        return;
      }
      const keyEl = event.target.closest("[data-key]");
      if (!keyEl) return;
      event.preventDefault();
      const keyId = keyEl.dataset.key;
      if (keyInputMode() === "hold") {
        pressedKeys.add(keyId);
        heldPointerToKey.set(event.pointerId, keyId);
        if (keyEl.setPointerCapture) keyEl.setPointerCapture(event.pointerId);
      } else {
        if (pressedKeys.has(keyId)) pressedKeys.delete(keyId);
        else pressedKeys.add(keyId);
      }
      renderKeypad();
      renderHardware();
    };

    const handleKeyPointerUp = (event) => {
      if (keyInputMode() !== "hold") return;
      const keyId = heldPointerToKey.get(event.pointerId);
      if (!keyId) return;
      heldPointerToKey.delete(event.pointerId);
      pressedKeys.delete(keyId);
      renderKeypad();
      renderHardware();
    };

    document.getElementById("keypad").addEventListener("pointerdown", handleKeyPointerDown);
    document.getElementById("hardware-wrap").addEventListener("pointerdown", handleKeyPointerDown);
    document.addEventListener("pointerup", handleKeyPointerUp);
    document.addEventListener("pointercancel", handleKeyPointerUp);

    document.getElementById("key-input-mode").addEventListener("change", () => {
      if (keyInputMode() === "hold") {
        heldPointerToKey.clear();
        pressedKeys.clear();
      }
      renderKeypad();
      renderHardware();
    });

    document.getElementById("force-k").addEventListener("input", (event) => {
      const input = event.target;
      const raw = (input.value || "").toUpperCase().replace(/[^0-9A-F]/g, "");
      input.value = raw.slice(-1);
      renderKeypad();
    });

    document.getElementById("lb05-value").addEventListener("input", (event) => {
      const input = event.target;
      const raw = (input.value || "").toUpperCase().replace(/[^0-9A-F]/g, "");
      input.value = raw.slice(-1);
      renderStatus();
      renderTrace();
    });

    document.addEventListener("keydown", (event) => {
      const target = event.target;
      const tag = target && target.tagName ? target.tagName.toUpperCase() : "";
      if (event.key === "Escape" && isRunning) {
        event.preventDefault();
        stopRequested = true;
        return;
      }
      if (tag === "INPUT" || tag === "TEXTAREA" || (target && target.isContentEditable)) return;
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      if (event.key === "s" || event.key === "S") {
        event.preventDefault();
        stepOne();
      } else if (event.key === "r" || event.key === "R") {
        event.preventDefault();
        if (animationEnabled()) stepUntilReturnAnimated();
        else stepUntilReturn();
      } else if (event.key === "c" || event.key === "C") {
        event.preventDefault();
        continueExecution();
      }
    });

    resetState();
  </script>
</body>
</html>
